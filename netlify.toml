# Optional: deploy on Netlify instead of Vercel. Pick one — don't use both.
# Just connect this folder to Netlify; it'll auto-detect this file.

[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/*"
  to   = "/SolarLink-CRM.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "SAMEORIGIN"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"
